version: '3.4'

# Please consult our docs for more info: https://docs.librechat.ai/install/configuration/docker_override.html

services:
  fastmcp-chembiotox:
    container_name: fastmcp-chembiotox
    image: cbtmcp
    ports:
      - "9222:9222"
    restart: unless-stopped
    networks:
      - autonomous

# Traefik network
networks:
  autonomous:
    driver: overlay
    external: true

volumes:
  cbtmcp:
